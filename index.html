<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlyChat</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем официальный и самый стабильный веб-сокет клиент -->
    <script src="https://pusher.com"></script>
</head>
<body>
    <div class="chat-app">
        <div class="header">
            <h3>🛸 FlyChat Global</h3>
        </div>
        <div class="messages" id="msgBox"></div>
        <div class="input-row">
            <input type="text" id="textInp" placeholder="Напишите сообщение..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
